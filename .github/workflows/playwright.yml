name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  visual-tests-windows:
    name: Visual Tests (Windows)
    timeout-minutes: 30
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Start static server
        shell: pwsh
        run: Start-Process python -ArgumentList "-m http.server 4173 --directory ."

      - name: Wait for server
        shell: pwsh
        run: |
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:4173" -UseBasicParsing
              if ($r.StatusCode -eq 200) { exit 0 }
            } catch {}
            Start-Sleep -Seconds 1
          }
          throw "Server did not start in time."

      - name: Run Playwright visual tests
        run: npx playwright test tests/visual-regression.spec.ts --project=chromium

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-windows
          path: playwright-report/
          retention-days: 30
          
      - name: Upload HTML report to Azure
        shell: bash
        run: |
          REPORT_DIR='run-${{ github.run_id }}-${{ github.run_attempt }}'
          azcopy cp --recursive "./playwright-report/*" "https://testreportci.blob.core.windows.net/\$web/$REPORT_DIR"
          echo "::notice title=HTML report url::https://testreportci.z1.web.core.windows.net/$REPORT_DIR/index.html"
        env:
          AZCOPY_AUTO_LOGIN_TYPE: SPN
          AZCOPY_SPA_APPLICATION_ID: '${{ secrets.AZCOPY_SPA_APPLICATION_ID }}'
          AZCOPY_SPA_CLIENT_SECRET: '${{ secrets.AZCOPY_SPA_CLIENT_SECRET }}'
          AZCOPY_TENANT_ID: '${{ secrets.AZCOPY_TENANT_ID }}'

  functional-tests-linux:
    name: Functional Tests (Linux)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright functional tests
        run: |
          python3 -m http.server 4173 --directory . &
          sleep 2
          npx playwright test tests/candy-corner.spec.js --project=chromium

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-linux
          path: playwright-report/
          retention-days: 30
